<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOKZ.NET</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
      width: 100%;
      max-width: 520px;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    header img {
      max-width: 100%;
      height: auto;
    }

    nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    nav a {
      display: block;
      text-align: center;
      text-decoration: none;
      background: #111;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 18px 12px;
      border-radius: 6px;
      transition: background 0.15s, transform 0.1s;
    }

    nav a:hover {
      background: #333;
      transform: translateY(-2px);
    }

    nav a:active {
      transform: translateY(0);
    }

    footer {
      padding: 20px;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }

    @media (max-width: 400px) {
      nav {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img src="lokz-logo.png" alt="LOKZ.NET">
    </header>
    <nav>
      <a href="mailto:mail@lokz.net">Contact</a>
      <a href="https://cyberia.bz/" target="_blank" rel="noopener">Creator</a>
    </nav>
  </main>
  <footer>Site Created by Cyberia.bz</footer>
</body>
</html>
